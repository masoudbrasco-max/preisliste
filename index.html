<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preisliste</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    margin-top: 20px;
}

.trade { color: red; }
.station { color: white; }

#search {
    width: 90%;
    padding: 10px;
    margin: 20px;
    border-radius: 10px;
    border: none;
}

.card {
    background: #222;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
    text-align: left;
}

button {
    background: red;
    border: none;
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
    margin-left: 5px;
}

.bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: black;
    padding: 10px;
}

.whatsapp {
    background: green;
    width: 95%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    color: white;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="logo">
<span class="trade">trade</span><span class="station">station</span>
</div>

<h3>preisliste</h3>

<input type="text" id="search" placeholder="suche iphone...">

<div id="list">lade daten...</div>

<div class="bottom">
<div id="total">gesamt: 0 €</div>
<input id="name" placeholder="dein name">
<input id="note" placeholder="notiz (optional)">
<button class="whatsapp" onclick="sendWhatsApp()">Bestellung senden</button>
</div>

<script>
const sheetURL = "https://opensheet.elk.sh/1siE-XT8Sprgn-GxBk1Q6j8XVsXDDu7r8DcshLTNfZlU/iphone_preise";

let cart = {};

fetch(sheetURL)
.then(res => res.json())
.then(data => {
    render(data);
})
.catch(() => {
    document.getElementById("list").innerHTML = "❌ Fehler beim Laden";
});

function render(data){
    let html = "";

    data.forEach(item => {

        html += `
        <div class="card">
            <b>${item.Modell}</b><br>

            ${row(item,"Display InCell")}
            ${row(item,"FHD")}
            ${row(item,"Hard OLED")}
            ${row(item,"Soft OLED")}
            ${row(item,"Akku")}
            ${row(item,"Akku Diagnose")}
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

function row(item,type){
    if(!item[type]) return "";

    const key = item.Modell + "-" + type;

    return `
    ${type}: ${item[type]}€
    <button onclick="change('${item.Modell}','${type}',${item[type]},-1)">-</button>
    <span id="${key}">0</span>
    <button onclick="change('${item.Modell}','${type}',${item[type]},1)">+</button>
    <br>
    `;
}

function change(model,type,price,change){
    const key = model+"-"+type;

    if(!cart[key]){
        cart[key] = {model,type,price,qty:0};
    }

    cart[key].qty += change;

    if(cart[key].qty <= 0){
        delete cart[key];
    }

    document.getElementById(key).innerText = cart[key]?.qty || 0;

    updateTotal();
}

function updateTotal(){
    let total = 0;

    for(let k in cart){
        total += cart[k].price * cart[k].qty;
    }

    document.getElementById("total").innerText = "gesamt: " + total + " €";
}

function sendWhatsApp(){
    let text = "Bestellung:\n";

    for(let k in cart){
        let i = cart[k];
        text += `${i.qty}x ${i.model} ${i.type} (${i.price}€)\n`;
    }

    text += "\nName: " + document.getElementById("name").value;
    text += "\nNotiz: " + document.getElementById("note").value;

    window.open("https://wa.me/4915238242082?text=" + encodeURIComponent(text));
}

document.getElementById("search").addEventListener("input", function(){
    const val = this.value.toLowerCase();
    document.querySelectorAll(".card").forEach(c=>{
        c.style.display = c.innerText.toLowerCase().includes(val) ? "block" : "none";
    });
});
</script>

</body>
</html>
