<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>tradestation preisliste</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
}

.logo {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 10px;
}

.trade { color: red; }
.station { color: white; }

h2 {
    margin-bottom: 20px;
}

table {
    width: 95%;
    margin: 20px auto;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #333;
    padding: 8px;
}

.card {
    background: #222;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    text-align: left;
}
</style>

</head>
<body>

<div class="logo">
    <span class="trade">trade</span><span class="station">station</span>
</div>

<h2>preisliste</h2>

<div id="content">
    lade daten...
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1siE-XT8Sprgn-GxBk1Q6j8XVsXDDu7r8DcshLTNfZlU/gviz/tq?tqx=out:json";

fetch(sheetURL)
.then(res => res.text())
.then(data => {
    const json = JSON.parse(data.substring(47).slice(0, -2));
    const rows = json.table.rows;

    let html = "";

    rows.forEach(row => {
        let cols = row.c;

        if (!cols || !cols[0]) return;

        html += `
        <div class="card">
            <strong>${cols[0]?.v || ""}</strong><br>
            incell: ${cols[1]?.v || "-"} €<br>
            fhd: ${cols[2]?.v || "-"} €<br>
            hard oled: ${cols[3]?.v || "-"} €<br>
            soft oled: ${cols[4]?.v || "-"} €<br>
            akku: ${cols[5]?.v || "-"} €<br>
            diagnostic akku: ${cols[6]?.v || "-"} €
        </div>
        `;
    });

    document.getElementById("content").innerHTML = html;
})
.catch(err => {
    document.getElementById("content").innerHTML = "fehler beim laden der daten";
    console.error(err);
});
</script>

</body>
</html>
