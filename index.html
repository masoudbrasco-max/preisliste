<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>preisliste</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
  margin: 0;
  padding: 20px;
}

.logo {
  font-size: 28px;
  font-weight: bold;
}

.trade { color: red; }
.station { color: white; }

#search {
  width: 95%;
  padding: 10px;
  margin: 15px auto;
  border-radius: 8px;
  border: none;
}

.card {
  background: #222;
  padding: 15px;
  margin: 10px auto;
  border-radius: 10px;
  width: 95%;
  text-align: left;
}

.row {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

.controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 6px;
}

.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  padding: 10px;
}

input {
  width: 48%;
  padding: 8px;
  margin: 5px 0;
}

.send {
  background: green;
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="logo">
  <span class="trade">trade</span><span class="station">station</span>
</div>

<h2>preisliste</h2>

<input type="text" id="search" placeholder="suche iphone...">

<div id="list">lade daten...</div>

<div class="footer">
  <div>gesamt: <span id="total">0</span> €</div>

  <!-- NEU: Standort Auswahl -->
  <select id="location" style="width:100%; padding:10px; margin-bottom:5px;">
    <option value="offenbach">Offenbach</option>
    <option value="kassel">Kassel</option>
  </select>

  <input id="name" placeholder="dein name">
  <input id="note" placeholder="notiz (optional)">

  <button class="send" onclick="sendWhatsApp()">Bestellung senden</button>
</div>

<script>
let cart = {};

fetch("https://opensheet.elk.sh/1siE-XT8Sprgn-GxBk1Q6j8XVsXDDu7r8DcshLTNfZlU/iphone_preise")
.then(res => res.json())
.then(data => render(data))
.catch(err => {
  document.getElementById("list").innerHTML = "❌ fehler beim laden (freigabe prüfen)";
});

function render(data){
  let html = "";
  data.forEach(item => {
    if(!item.Modell) return;

    html += `<div class="card">
      <b>${item.Modell}</b>
      ${row(item, "Display InCell")}
      ${row(item, "FHD")}
      ${row(item, "Hard OLED")}
      ${row(item, "Soft OLED")}
      ${row(item, "Akku")}
      ${row(item, "Akku Diagnose")}
    </div>`;
  });

  document.getElementById("list").innerHTML = html;
}

function row(item, type){
  if(!item[type] || item[type] === "-") return "";

  return `
  <div class="row">
    <span>${type}: ${item[type]}€</span>
    <div class="controls">
      <button onclick="changeQty('${item.Modell}','${type}',${item[type]},-1)">-</button>
      <span id="${item.Modell}_${type}">0</span>
      <button onclick="changeQty('${item.Modell}','${type}',${item[type]},1)">+</button>
    </div>
  </div>`;
}

function changeQty(model,type,price,change){
  const key = model + "_" + type;

  if(!cart[key]){
    cart[key] = {model,type,price,qty:0};
  }

  cart[key].qty += change;

  if(cart[key].qty <= 0){
    delete cart[key];
    document.getElementById(key).innerText = 0;
  } else {
    document.getElementById(key).innerText = cart[key].qty;
  }

  updateTotal();
}

function updateTotal(){
  let total = 0;

  for(let key in cart){
    let item = cart[key];
    total += item.price * item.qty;
  }

  document.getElementById("total").innerText = total;
}

function sendWhatsApp(){
  let text = "🛒 Bestellung:%0A";
  let total = 0;

  for(let key in cart){
    let item = cart[key];
    let sum = item.price * item.qty;
    total += sum;

    text += `${item.qty}x ${item.model} (${item.type}) = ${sum}€%0A`;
  }

  text += "%0A💰 Gesamt: " + total + "€";

  let name = document.getElementById("name").value;
  let note = document.getElementById("note").value;

  text += "%0A👤 Name: " + name;
  text += "%0A📝 Notiz: " + note;

  let location = document.getElementById("location").value;

  let numbers = {
    offenbach: "4915238242082",
    kassel: "491772897314"
  };

  let number = numbers[location];

  text += "%0A📍 Standort: " + location;

  window.open(`https://wa.me/${number}?text=${text}`);
}

document.getElementById("search").addEventListener("input", function(){
  let input = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(input)
      ? "block"
      : "none";
  });
});
</script>

</body>
</html>
