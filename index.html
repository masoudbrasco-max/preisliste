<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preisliste</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;

  /* 🔥 FIX gegen Überlappung */
  padding-bottom: 220px;
}

h1 {
  text-align: center;
  color: red;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 10px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 5px 0;
}

.controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn {
  background: red;
  border: none;
  color: white;
  padding: 5px 10px;
  border-radius: 6px;
}

.qty {
  min-width: 20px;
  text-align: center;
}

/* Bottom Bar */
.bottom-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000;
  border-top: 2px solid red;
  padding: 10px;
  z-index: 999;
}

.total {
  text-align: center;
  margin-bottom: 5px;
}

button.send {
  width: 100%;
  padding: 12px;
  background: green;
  border: none;
  color: white;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>tradestation</h1>
<h2>preisliste</h2>

<div class="container">

<input id="search" placeholder="suche iphone...">

<div id="list"></div>

</div>

<!-- Bottom -->
<div class="bottom-bar">

<div class="total">gesamt: <span id="total">0</span> €</div>

<select id="location">
  <option value="offenbach">Offenbach</option>
  <option value="kassel">Kassel</option>
</select>

<input id="name" placeholder="dein name">
<input id="note" placeholder="notiz (optional)">

<button class="send" onclick="send()">Bestellung senden</button>

</div>

<script>

/* ✅ DEIN SHEET (KORREKT UMGEBAUT) */
const sheetURL = "https://docs.google.com/spreadsheets/d/1siE-XT8Sprgn-GxBk1Q6j8XVsXDDu7r8DcshLTNfZlU/gviz/tq?tqx=out:json&sheet=iphone_preise";

let cart = {};

fetch(sheetURL)
.then(res => res.text())
.then(text => {
  const json = JSON.parse(text.substring(47).slice(0, -2));
  const rows = json.table.rows.map(r => {
    return {
      Modell: r.c[0]?.v,
      "Display InCell": r.c[1]?.v,
      FHD: r.c[2]?.v,
      "Hard OLED": r.c[3]?.v,
      "Soft OLED": r.c[4]?.v,
      Akku: r.c[5]?.v,
      "Akku Diagnose": r.c[6]?.v
    };
  });
  render(rows);
})
.catch(() => {
  document.getElementById("list").innerHTML = "❌ fehler beim laden (freigabe prüfen)";
});

function render(data){
  let html = "";

  data.forEach(item => {
    if(!item.Modell) return;

    let rows = "";
    rows += row(item, "Display InCell", "incell");
    rows += row(item, "FHD", "fhd");
    rows += row(item, "Hard OLED", "hard");
    rows += row(item, "Soft OLED", "soft");
    rows += row(item, "Akku", "akku");
    rows += row(item, "Akku Diagnose", "diag");

    if(!rows) rows = "<div style='opacity:0.5'>Keine Preise verfügbar</div>";

    html += `
      <div class="card">
        <b>${item.Modell}</b>
        ${rows}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function row(item, label, key){
  let price = item[label];
  if(price === "" || price === undefined || price === null) return "";

  let id = item.Modell + "-" + key;

  return `
    <div class="row">
      <span>${label}: ${price}€</span>
      <div class="controls">
        <button class="btn" onclick="change('${id}','${item.Modell}','${label}',${price},-1)">-</button>
        <span class="qty" id="${id}">0</span>
        <button class="btn" onclick="change('${id}','${item.Modell}','${label}',${price},1)">+</button>
      </div>
    </div>
  `;
}

function change(id, model, type, price, diff){
  if(!cart[id]) cart[id] = {model, type, price, qty:0};

  cart[id].qty += diff;

  if(cart[id].qty <= 0) delete cart[id];

  document.getElementById(id).innerText = cart[id] ? cart[id].qty : 0;

  update();
}

function update(){
  let total = 0;
  Object.values(cart).forEach(i => total += i.qty * i.price);
  document.getElementById("total").innerText = total;
}

function send(){
  let text = "Bestellung:%0A";

  Object.values(cart).forEach(i => {
    text += `${i.qty}x ${i.model} ${i.type} (${i.price}€)%0A`;
  });

  let total = document.getElementById("total").innerText;
  text += "%0AGesamt: " + total + "€%0A";

  text += "Name: " + document.getElementById("name").value + "%0A";
  text += "Notiz: " + document.getElementById("note").value;

  let loc = document.getElementById("location").value;

  let number = loc === "kassel"
    ? "491772897314"
    : "4915238242082";

  window.open(`https://wa.me/${number}?text=${text}`);
}

document.getElementById("search").addEventListener("input", function(){
  let val = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
  });
});

</script>

</body>
</html>
