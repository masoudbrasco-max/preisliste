<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>tradestation preisliste</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
}

.logo {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 10px;
}

.trade {
    color: red;
}

.station {
    color: white;
}

h2 {
    margin-bottom: 30px;
}

#preise {
    max-width: 600px;
    margin: auto;
}

.card {
    background: #222;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    text-align: left;
}

.card b {
    font-size: 18px;
}
</style>

</head>

<body>

<div class="logo">
    <span class="trade">trade</span><span class="station">station</span>
</div>

<h2>preisliste</h2>

<div id="preise">lade daten...</div>

<script>
async function ladePreise() {

    const url = "https://opensheet.elk.sh/1siE-XT8Sprgn-GxBk1Q6j8XVsXDDu7r8DcshLTNfZlU/Sheet1";

    try {
        const res = await fetch(url);
        const data = await res.json();

        let output = "";

        data.forEach(item => {

            output += `
            <div class="card">
                <b>${item.Modell || "-"}</b><br><br>

                incell: ${item["Display InCell"] || "-"} €<br>
                fhd: ${item.FHD || "-"} €<br>
                hard oled: ${item["Hard OLED"] || "-"} €<br>
                soft oled: ${item["Soft OLED"] || "-"} €<br><br>

                akku: ${item.Akku || "-"} €<br>
                akku diagnose: ${item["Akku Diagnose"] || "-"} €
            </div>
            `;
        });

        document.getElementById("preise").innerHTML = output;

    } catch (error) {
        document.getElementById("preise").innerHTML = "fehler beim laden der daten";
        console.error(error);
    }
}

ladePreise();
</script>

</body>
</html>
