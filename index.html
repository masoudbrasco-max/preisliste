<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preisliste</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
}

.header h1 {
  color: red;
  margin: 0;
}

.search {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.card {
  background: #1a1a1a;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 6px 0;
}

.qty {
  display: flex;
  align-items: center;
  gap: 8px;
}

.qty button {
  background: red;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-weight: bold;
}

.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  padding: 6px;
  font-size: 14px;
  border-top: 2px solid red;
}

.footer input, .footer select {
  width: 95%;
  margin: 4px auto;
  display: block;
  padding: 6px;
  font-size: 14px;
  border-radius: 8px;
  border: none;
}

.footer button {
  width: 95%;
  margin: 8px auto;
  display: block;
  padding: 8px;
  font-size: 14px;
  background: green;
  color: white;
  border: none;
  border-radius: 10px;
}

.total {
  text-align: center;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="header">
  <h1>tradestation</h1>
  <p>preisliste</p>
</div>

<input class="search" placeholder="suche iphone..." oninput="search(this.value)">

<div id="list"></div>

<div style="height:260px;"></div>

<div class="footer">
  <div class="total">gesamt: <span id="total">0</span> €</div>

  <select id="location">
    <option value="offenbach">Offenbach</option>
    <option value="kassel">Kassel</option>
  </select>

  <input id="name" placeholder="dein name">
  <input id="note" placeholder="notiz (optional)">

  <button onclick="send()">Bestellung senden</button>
</div>

<script>
const SHEET = "https://opensheet.elk.sh/1siE-XT8Sprgn-GxBk1Q6j8XVsXDDu7r8DcshLTNfZlU/iphone_preise";

let data = [];
let cart = JSON.parse(localStorage.getItem("cart") || "{}");

fetch(SHEET)
.then(r => r.json())
.then(json => {
  data = json;
  render(data);
});

function row(item, label, key){
  let price = item[label];

  // 🔥 FIX für dein Problem (null / undefined / leer)
  if(price === undefined){
    const fixed = Object.keys(item).find(k => k.trim() === label.trim());
    if(fixed) price = item[fixed];
  }

  if(price === "" || price === null || price === undefined || isNaN(price)){
    return "";
  }

  return `
    <div class="row">
      <span>${label}: ${price}€</span>
      <div class="qty">
        <button onclick="change('${key}', -1)">-</button>
        <span id="${key}">${cart[key] || 0}</span>
        <button onclick="change('${key}', 1)">+</button>
      </div>
    </div>
  `;
}

function render(list){
  let html = "";

  list.forEach(item => {
    let model = item["Modell"];
    if(!model) return;

    let block = `
      <div class="card">
        <b>${model}</b>
        ${row(item,"Display InCell", model+"-incell")}
        ${row(item,"FHD", model+"-fhd")}
        ${row(item,"Hard OLED", model+"-hard")}
        ${row(item,"Soft OLED", model+"-soft")}
        ${row(item,"Akku", model+"-akku")}
        ${row(item,"Akku Diagnose", model+"-diag")}
      </div>
    `;

    html += block;
  });

  document.getElementById("list").innerHTML = html;
  update();
}

function change(key, val){
  cart[key] = (cart[key] || 0) + val;
  if(cart[key] <= 0) delete cart[key];

  localStorage.setItem("cart", JSON.stringify(cart));

  let el = document.getElementById(key);
  if(el) el.innerText = cart[key] || 0;

  update();
}

function update(){
  let total = 0;

  for(let key in cart){
    let [model,type] = key.split("-");
    let item = data.find(i => i["Modell"] === model);

    if(item){
      let price = item[typeMap(type)];
      if(!isNaN(price)) total += price * cart[key];
    }
  }

  document.getElementById("total").innerText = total;
}

function typeMap(type){
  return {
    incell:"Display InCell",
    fhd:"FHD",
    hard:"Hard OLED",
    soft:"Soft OLED",
    akku:"Akku",
    diag:"Akku Diagnose"
  }[type];
}

function send(){
  let text = "Bestellung:%0A";
  let total = 0;

  for(let key in cart){
    let [model,type] = key.split("-");
    let item = data.find(i => i["Modell"] === model);

    if(item){
      let field = typeMap(type);
      let price = item[field];

      if(price && !isNaN(price)){
        let sum = price * cart[key];
        total += sum;

        text += `${cart[key]}x ${model} ${field} (${price}€) = ${sum}€%0A`;
      }
    }
  }

  text += `%0AGesamt: ${total}€`;

  let name = document.getElementById("name").value;
  let note = document.getElementById("note").value;

  if(name) text += `%0AName: ${name}`;
  if(note) text += `%0ANotiz: ${note}`;

  let location = document.getElementById("location").value;

  let number = location === "kassel"
    ? "491772897314"
    : "4915238242082";

  window.open(`https://wa.me/${number}?text=${text}`);
}

function search(val){
  val = val.toLowerCase();
  let filtered = data.filter(i =>
    (i["Modell"] || "").toLowerCase().includes(val)
  );
  render(filtered);
}
</script>

</body>
</html>
