<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>tradestation preisliste</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    margin: 0;
    padding: 15px;
    padding-bottom: 260px;
}

.logo {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.trade { color: red; }
.station { color: white; }

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.search {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
}

.card {
    background: #222;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 10px;
}

.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 5px 0;
}

.controls {
    display: flex;
    align-items: center;
}

.btn {
    background: red;
    border: none;
    color: white;
    width: 30px;
    height: 30px;
    border-radius: 6px;
    margin: 0 3px;
    font-size: 18px;
}

.qty {
    width: 30px;
    text-align: center;
}

.cart {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #000;
    padding: 15px;
    border-top: 2px solid red;
}

.cart input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}

.cart button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: green;
    border: none;
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="logo">
    <span class="trade">trade</span><span class="station">station</span>
</div>

<h2>preisliste</h2>

<input class="search" placeholder="suche iphone..." onkeyup="search()">

<div id="list">lade daten...</div>

<div class="cart">
    <div>gesamt: <span id="total">0</span> €</div>
    <input id="name" placeholder="dein name">
    <input id="note" placeholder="notiz (optional)">
    <button onclick="sendWhatsApp()">📲 Bestellung senden</button>
</div>

<script>

// ❗ HIER ggf. TAB NAMEN ÄNDERN (Sheet1 / Tabelle1)
const sheetURL = "https://opensheet.elk.sh/1siE-XT8Sprgn-GxBk1Q6j8XVsXDDu7r8DcshLTNfZlU/Sheet1";

let cart = {};

fetch(sheetURL)
.then(res => res.json())
.then(data => {
    console.log("DATA:", data);

    if(!data || data.length === 0){
        document.getElementById("list").innerHTML = "❌ keine daten gefunden (sheet prüfen)";
        return;
    }

    render(data);
})
.catch(err => {
    console.error(err);
    document.getElementById("list").innerHTML = "❌ fehler beim laden (freigabe prüfen)";
});

function render(data){
    let html = "";

    data.forEach(item => {
        html += `
        <div class="card">
            <b>${item.modell}</b>
            ${row(item, "incell")}
            ${row(item, "fhd")}
            ${row(item, "hard oled")}
            ${row(item, "soft oled")}
            ${row(item, "akku")}
            ${row(item, "diagnostic akku")}
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

function row(item, type){
    if(!item[type] || item[type] === "-") return "";

    return `
    <div class="row">
        <span>${type}: ${item[type]}€</span>
        <div class="controls">
            <button class="btn" onclick="changeQty('${item.modell}','${type}', ${item[type]}, -1)">-</button>
            <span id="${item.modell}-${type}" class="qty">0</span>
            <button class="btn" onclick="changeQty('${item.modell}','${type}', ${item[type]}, 1)">+</button>
        </div>
    </div>
    `;
}

function changeQty(model, type, price, change){
    const key = model + "-" + type;

    if(!cart[key]) cart[key] = {model, type, price, qty:0};

    cart[key].qty += change;

    if(cart[key].qty <= 0){
        delete cart[key];
        document.getElementById(model + "-" + type).innerText = 0;
    }

    update();
}

function update(){
    let total = 0;

    for(let key in cart){
        let item = cart[key];
        total += item.price * item.qty;

        document.getElementById(item.model + "-" + item.type).innerText = item.qty;
    }

    document.getElementById("total").innerText = total;
}

function sendWhatsApp(){
    let text = "bestellung:%0A";

    for(let key in cart){
        let i = cart[key];
        text += `${i.qty}x ${i.model} ${i.type} = ${i.price*i.qty}€%0A`;
    }

    text += "%0Agesamt: " + document.getElementById("total").innerText + "€";
    text += "%0Aname: " + document.getElementById("name").value;
    text += "%0Anotiz: " + document.getElementById("note").value;

    window.open("https://wa.me/4915238242082?text=" + text);
}

function search(){
    let input = document.querySelector(".search").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
    });
}

</script>

</body>
</html>
